name: Financial RAG CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # CHECKOUT REPOSITORY
      - name: Checkout Repository
        uses: actions/checkout@v4

      # SETUP PYTHON
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # INSTALL DEPENDENCIES
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # OPTIONAL: RUN BASIC CHECK
      - name: Verify Streamlit App
        run: |
          python -m py_compile rag_pipeline.py
          python -m py_compile streamlit_app.py
          python -m py_compile app.py
          python -m py_compile rag_evaluation.py

      # BUILD DOCKER IMAGE
      - name: Build Docker Image
        run: |
          docker build -t financial-rag-chatbot .

      # LOGIN TO DOCKER HUB
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # TAG IMAGE
      - name: Tag Docker Image
        run: |
          docker tag financial-rag-chatbot ${{ secrets.DOCKER_USERNAME }}/financial-rag-chatbot:latest

      # PUSH IMAGE
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/financial-rag-chatbot:latest